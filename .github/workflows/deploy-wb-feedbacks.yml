name: Deploy wb-feedbacks

on:
  push:
    branches: [main, feature/wb-unit-calc]
  workflow_dispatch:

concurrency:
  group: wb-feedbacks-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FEEDBACKS_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Deploy to Vercel production
        run: npx vercel@54.11.1 deploy --prod --yes --local-config vercel.feedbacks.json --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_GIT_COMMIT_SHA: ${{ github.sha }}
          GITHUB_SHA: ${{ github.sha }}
