name: Deploy wb-feedbacks

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: wb-feedbacks-production
  cancel-in-progress: true

jobs:
  deploy:
    if: github.repository == 'egmen1-dev/wb-feedbacks'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FEEDBACKS_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Deploy to Vercel production
        run: npx vercel@54.11.1 deploy --prod --yes --local-config vercel.feedbacks.json --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_GIT_COMMIT_SHA: ${{ github.sha }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Verify production version
        run: |
          for i in 1 2 3 4 5 6; do
            body=$(curl -fsS https://wb-feedbacks.vercel.app/api/feedbacks/version || true)
            echo "$body"
            echo "$body" | grep -q "\"commitSha\":\"${GITHUB_SHA:0:7}\"" && exit 0
            echo "Waiting for propagation ($i/6)..."
            sleep 15
          done
          echo "::error::Production commitSha does not match ${GITHUB_SHA:0:7}"
          exit 1
        env:
          GITHUB_SHA: ${{ github.sha }}
