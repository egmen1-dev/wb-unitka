name: Deploy wb-unitka

on:
  push:
    branches: [main, feature/wb-unit-calc]
  workflow_dispatch:

concurrency:
  group: wb-unitka-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_UNIT_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Verify unit Vercel config
        run: |
          node -e "
            const fs = require('fs');
            for (const f of ['vercel.json', 'vercel.unit.json']) {
              const c = JSON.parse(fs.readFileSync(f, 'utf8'));
              if (!String(c.buildCommand || '').includes('wb-unit-calc') || c.outputDirectory !== 'wb-unit-calc/dist') {
                console.error(f + ' must build wb-unit-calc, got:', c.buildCommand, c.outputDirectory);
                process.exit(1);
              }
            }
            if (fs.readFileSync('vercel.json', 'utf8') !== fs.readFileSync('vercel.unit.json', 'utf8')) {
              console.error('vercel.json must match vercel.unit.json on unit branches');
              process.exit(1);
            }
          "

      - name: Deploy to Vercel production
        run: npx vercel@54.11.1 deploy --prod --yes --local-config vercel.unit.json --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_GIT_COMMIT_SHA: ${{ github.sha }}
          GITHUB_SHA: ${{ github.sha }}
