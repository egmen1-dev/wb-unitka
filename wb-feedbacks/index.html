<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI-ответы на отзывы Wildberries" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Отзывы WB — AI-ответы</title>
  </head>
  <body>
    <div id="root">
      <div
        style="
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: system-ui, sans-serif;
          color: #475569;
          background: #f1f5f9;
        "
      >
        Загрузка…
      </div>
    </div>
    <noscript>
      <p style="padding: 1rem; font-family: system-ui, sans-serif">
        Для работы «Отзывы WB» нужен JavaScript в браузере.
      </p>
    </noscript>
    <script>
      window.addEventListener(
        'error',
        function (event) {
          if (!event.target || event.target.tagName !== 'SCRIPT') return;
          var root = document.getElementById('root');
          if (!root) return;
          root.innerHTML =
            '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;font-family:system-ui,sans-serif;background:#fef2f2;color:#991b1b;text-align:center">' +
            '<div><p style="font-weight:600;margin:0 0 0.5rem">Не удалось загрузить приложение</p>' +
            '<p style="margin:0;font-size:0.875rem;color:#7f1d1d">Обновите страницу или проверьте деплой на Vercel.</p></div></div>';
        },
        true
      );
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
